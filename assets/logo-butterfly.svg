<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <style>
      .wing-l { transform-origin: 100px 100px; animation: flap-left 0.9s ease-in-out infinite; }
      .wing-r { transform-origin: 100px 100px; animation: flap-right 0.9s ease-in-out infinite; }
      @keyframes flap-left {
      0%, 100% { transform: rotate(0deg) scaleX(1); }
      50% { transform: rotate(28deg) scaleX(0.25); }
      }
      @keyframes flap-right {
      0%, 100% { transform: rotate(0deg) scaleX(1); }
      50% { transform: rotate(-28deg) scaleX(0.25); }
      }
    </style>
  </defs>
  <g class="wing-l">
    <path d="M100,95 C60,40 10,45 8,90 C6,130 55,140 100,110 Z" fill="#1b2a4a"/>
    <path d="M100,108 C70,120 40,150 52,178 C62,198 92,168 100,128 Z" fill="#1b2a4a" opacity="0.85"/>
    <circle cx="45" cy="80" r="6" fill="#f5a623"/>
  </g>
  <g class="wing-r">
    <path d="M100,95 C140,40 190,45 192,90 C194,130 145,140 100,110 Z" fill="#1b2a4a"/>
    <path d="M100,108 C130,120 160,150 148,178 C138,198 108,168 100,128 Z" fill="#1b2a4a" opacity="0.85"/>
    <circle cx="155" cy="80" r="6" fill="#f5a623"/>
  </g>
  <ellipse cx="100" cy="100" rx="7" ry="50" fill="#10192e"/>
  <circle cx="100" cy="48" r="8" fill="#10192e"/>
  <path d="M100,48 C92,30 78,20 68,14" stroke="#10192e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M100,48 C108,30 122,20 132,14" stroke="#10192e" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
